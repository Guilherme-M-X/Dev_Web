<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" type="text/css" href="src/style.css">

</head>

<body>
    <div id="background">

        <!-- Inicio Cabeçalho do site -->
        <div id="topo">
            <img src="images/logo.png" alt="Logo do Site" class="logo" width="150" height="auto">

            <div class="texto-topo">
                <h1>Contato</h1>
                <p>
                    Dúvidas sobre uma receita ou quer compartilhar o resultado do seu prato?
                    Adoramos receber mensagens! Use o formulário abaixo ou nos envie um e-mail. Vamos conversar sobre
                    comida!
                </p>
            </div>
        </div>
        <!-- Fim Cabeçalho do site -->

        <!-- Menu de navegação -->
        <div id="menu">
            <a href="index.html">Home</a> |
            <a href="sobre.html">Sobre</a> |
            <a href="contato.html">Contato</a>

        </div>
        <!-- Fim Menu de navegação -->

        <!-- Inicio Formulario de Contato-->
        <div>
            <h2>Formulário</h2>
            <form action="#" method="post">
                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="4" cols="50" required></textarea><br><br>

                <input type="submit" value="Enviar">
            </form>
        </div>
        <!-- Fim Formulario de Contato-->

    </div>
</body>

</html>
